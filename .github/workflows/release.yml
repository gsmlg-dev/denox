name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare v${{ inputs.version }}
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Update version in mix.exs
        run: sed -i 's/@version ".*"/@version "${{ inputs.version }}"/' mix.exs

      - name: Update version in Cargo.toml
        run: sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' native/denox_nif/Cargo.toml

      - name: Commit version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs native/denox_nif/Cargo.toml
          if git diff --cached --quiet; then
            echo "Version already at ${{ inputs.version }}, no commit needed"
          else
            git commit -m "chore: bump version to ${{ inputs.version }}"
            git push origin HEAD:main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }}
    needs: prepare
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.17"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, cross: true }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.0"

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Build precompiled NIF
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: denox_nif
          project-dir: native/denox_nif
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.cross || '' }}
          project-version: ${{ inputs.version }}

      - name: Upload NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.job.target }}-nif${{ matrix.nif }}
          path: _build/artifacts/**

  publish_hex:
    name: Publish to Hex
    needs: [prepare, build_release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Download all NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: _build/artifacts
          pattern: nif-*
          merge-multiple: true

      - name: Generate checksum file
        run: mix rustler_precompiled.download Denox.Native --all --print
        env:
          DENOX_BUILD: false

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  create_release:
    name: Create GitHub Release
    needs: [prepare, build_release, publish_hex]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Download all NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nif-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/**
