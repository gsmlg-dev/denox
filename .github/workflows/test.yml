name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  RUST_BACKTRACE: 1
  DENOX_BUILD: "true"

jobs:
  test:
    name: Test (Elixir 1.18 / OTP 28)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28.0"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and V8 build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/denox_nif/target
          key: rust-${{ runner.os }}-${{ hashFiles('native/denox_nif/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Cache Elixir dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-1.18-28.0-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-1.18-28.0-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
