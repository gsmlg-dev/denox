name: E2E

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  DENOX_BUILD: "true"

jobs:
  e2e:
    name: E2E (Elixir 1.18 / OTP 28)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28.0"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and V8 build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/denox_nif/target
          key: rust-${{ runner.os }}-${{ hashFiles('native/denox_nif/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Cache Elixir dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-e2e-${{ runner.os }}-1.18-28.0-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-e2e-${{ runner.os }}-1.18-28.0-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run E2E tests
        run: mix test.e2e
        env:
          MIX_ENV: test
